<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
            <fieldset>
            <legend><b>Student Registration</b></legend>
            <label for="firstname"><b>FirstName:</b></label>
            <input type="text" id="firstname"/>
            <label><b>(max 20 char a-z and A-Z)</b></label><br/><br/>
            <label for="lastname"><b>LastName:</b></label>
            <input type="text" id="lastname"/>
            <label><b>(max 20 chars a-z and A-Z)</b></label><br/><br/>
            <label for="date of birth"><b>Date of Birth:</b></label>
            <input type="date"/><br/><br/>
            
            
            <label for="gender"><b>GENDER:</b></label>
            <b>male</b><input type="radio" name="gender"/>
            <b>female</b><input type="radio" name="gender"/>
            <br/><br/> 
            <label for="email id"><b>EMAIL ID:</b></label>
            <input type="text" id="email id"/>
            <br/><br/>
            <label for="mobile no"><b>MOBILE NO:</b></label>
            <input type="text" name="mobile no"/><br/><br/>
            
            
            <label for="address"><b>ADDRESS:</b></label>
            
            <textarea name="address" id="address"></textarea>
             <br/><br/>
            <label for="city">CITY</label>
            <input type="text" id="city"/>
            <br/><br/>
            <label for="pincode"><b>PINCODE</b></label>
        
            <input type="text" id="pincode"/>
            <label><b>(6 digit number)</b></label>
            <br/><br/>

            <label for="state"><b>STATE</b></label>
            <input type="text" id="state"/>
            <br/><br/>
            <label for="country"><b>COUNTRY</b></label>
            <input type="text" id="country"/>
            <br/><br/>
            <label for="hobbies"><b>HOBBIES:</b></label>
            <input type="checkbox" name="hobbies" value="drawing"/><b>Drawing</b>
            <input type="checkbox" name="hobbies" value="singing"/><b>Singing</b>
            <input type="checkbox" name="hobbies" value="dancing"/><b>Dancing</b><br/><br/>
            <input type="checkbox" name="hobbies" value="other" /><b>Other</b>
            <input type="text" placeholder=""/>
           <br/><br/>
        
            
            <label for="qualification"><b>Qualification</b></label>

            <tr>
            <th>sl.no</th>
            <th>Examination</th>
            <th>Board</th>
            <th>Percentage</th>
            <th>Year of pass</th>
           </tr>

            <td><input type="text"></td>

            
           </tr>
           <tr>
            <td>02</td>

            <td><input type="text"></td>

           <tr>
            <td>03</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>

        </tr>
        <tr>
            <td>04</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>
    </table>
    <br/><br/>
    <label for="courses applied for"><b>COURSES APPLIED FOR</b></label>
    <input type="checkbox" id="bca"/><b>BCA</b>
    <input type="checkbox" id="b.com"/><b>B.com</b>
     <inpu type="checkbox" id="b.sc"/><b>B.sc</b>  
     <input type="checkbox" id="b.a"/><b>B.A</b>
     <br/><br/>
     <button><b>Submit</b></button>

    </fieldset>

</body>
</html>
